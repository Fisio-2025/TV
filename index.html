<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Receiver WebRTC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        #config-overlay { background: rgba(15, 23, 42, 0.95); }
    </style>
</head>
<body class="h-screen overflow-hidden">

    <div id="config-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-md w-full">
            <h2 class="text-xl font-bold mb-4 text-blue-400">Konfiguracja Receivera</h2>
            <p class="text-sm text-slate-400 mb-6">Wprowadź dowolne ID dla tego ekranu.</p>
            
            <input type="text" id="peer-id-input" placeholder="Wpisz ID (np. tv-salon)" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 mb-4 text-white focus:outline-none focus:border-blue-500">
            
            <button id="start-receiver-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all">
                URUCHOM RECEIVER
            </button>
        </div>
    </div>

    <div id="main-ui" class="flex h-screen p-4 gap-4 opacity-20 transition-opacity duration-1000 hidden">
        <div class="flex-1 flex gap-4">
            <camera-view title="Widok ciebie" status="LIVE" time="00:00" ismain="true"></camera-view>
            <camera-view title="Widok wzorcowy" status="AI ACTIVE"></camera-view>
        </div>
        
        <div class="w-[450px] flex-shrink-0">
            <exercise-sidebar></exercise-sidebar>
        </div>
    </div>

    <script type="module" src="./cast.js"></script>
</body>
</html>
