<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Receiver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        #config-overlay { background: rgba(15, 23, 42, 0.95); }
    </style>
</head>
<body class="h-screen overflow-hidden relative">

    <div id="status-overlay" class="fixed top-8 left-1/2 -translate-x-1/2 z-[60] bg-slate-800 text-white px-6 py-3 rounded-full font-medium shadow-2xl border border-slate-700 transition-opacity duration-300 opacity-0 pointer-events-none"></div>

    <div id="config-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-md w-full">
            <h2 class="text-xl font-bold mb-4 text-blue-400">Gotowy do treningu?</h2>
            <p class="text-sm text-slate-400 mb-6">Wprowadź ID swojego ekranu, aby połączyć się z telefonem.</p>
            <input type="text" id="peer-id-input" placeholder="np. tv-salon" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 mb-4 text-white focus:outline-none focus:border-blue-500">
            <button id="start-receiver-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all disabled:opacity-50">
                URUCHOM EKRAN
            </button>
        </div>
    </div>

    <div id="main-ui" class="flex h-screen p-4 gap-4 opacity-0 transition-opacity duration-1000 hidden relative">
        <button id="disconnect-btn" class="absolute top-8 right-8 z-50 bg-red-500/10 hover:bg-red-500/20 border border-red-500/50 text-red-400 px-6 py-2 rounded-full font-bold transition-all backdrop-blur-md">
            Zakończ trening
        </button>
        <div class="flex-1 flex gap-4 mt-16">
            <camera-view title="Widok ciebie" status="LIVE" time="00:00" ismain="true"></camera-view>
            <camera-view title="Widok wzorcowy" status="AI ACTIVE"></camera-view>
        </div>
        <div class="w-[450px] flex-shrink-0 mt-16">
            <exercise-sidebar></exercise-sidebar>
        </div>
    </div>

    <script type="module" src="./cast.js"></script>
</body>
</html>
