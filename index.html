<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; }
        google-cast-launcher { width: 32px; height: 32px; --connected-color: #4361EE; }
    </style>
</head>
<body class="bg-slate-800">

    <div class="flex h-screen p-4 gap-4 overflow-hidden">
        <div class="flex-1 flex gap-4">
            <camera-view title="Widok przedni" status="GOTOWY" time="00:00"></camera-view>
            <camera-view title="Widok boczny" status="PRZYKŁAD"></camera-view>
        </div>
        
        <div class="w-[400px] flex-shrink-0 relative">
            <div class="absolute top-4 right-8 z-10">
                <google-cast-launcher id="cast-button"></google-cast-launcher>
            </div>
            <exercise-sidebar></exercise-sidebar>
        </div>
    </div>

    <script type="module">
        import './components/CameraView.js';
        import './components/StatBox.js';
        import './components/ExerciseListItem.js';
        import './components/ExerciseSidebar.js';
        import './cast.js';
    </script>
</body>
</html>
