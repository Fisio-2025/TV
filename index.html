<!DOCTYPE html>
<html>
<head>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:40px;">
  <h1 id="status">Czekam na połączenie...</h1>
  <pre id="data" style="font-size:2em; margin-top:40px;"></pre>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = true;

    context.addCustomMessageListener('urn:x-cast:com.physio.poc', event => {
      document.getElementById('status').textContent = 'Połączono!';
      document.getElementById('data').textContent = 
        JSON.stringify(event.data, null, 2);
    });

    context.start(options);
  </script>
</body>
</html>
