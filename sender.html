<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening Sender WebRTC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6 font-sans">
    
    <div class="max-w-md mx-auto space-y-6">
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                1. Kamera
            </h2>
            <div class="aspect-video bg-black rounded-lg overflow-hidden mb-4 relative ring-1 ring-slate-700">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
            </div>
            <button id="start-cam-btn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition-all">
                Włącz Kamerę
            </button>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                2. Połączenie
            </h2>
            <input type="text" id="target-id-input" placeholder="Wpisz ID Receivera" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 mb-4 text-white focus:outline-none focus:border-blue-500">
            <button id="connect-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all disabled:opacity-50">
                Połącz i Przesyłaj
            </button>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                3. Dane JSON
            </h2>
            <textarea id="json-input" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 mb-4 text-white font-mono text-sm focus:outline-none focus:border-blue-500">
{
  "reps": 5,
  "title": "Trening klatki piersiowej"
}
            </textarea>
            <button id="send-data-btn" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Wyślij JSON
            </button>
        </div>
    </div>

    <script>
        const localVideo = document.getElementById('local-video');
        const startCamBtn = document.getElementById('start-cam-btn');
        const connectBtn = document.getElementById('connect-btn');
        const targetIdInput = document.getElementById('target-id-input');
        const sendDataBtn = document.getElementById('send-data-btn');
        const jsonInput = document.getElementById('json-input');

        let localStream = null;
        let peer = null;
        let dataConnection = null;
        let activeCall = null;

        startCamBtn.addEventListener('click', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                localVideo.srcObject = localStream;
                startCamBtn.classList.replace('bg-slate-700', 'bg-green-700');
                startCamBtn.innerText = "Kamera aktywna";
            } catch (err) {
                alert("Błąd kamery: " + err.message);
            }
        });

        connectBtn.addEventListener('click', () => {
            const targetId = targetIdInput.value.trim();
            if (!targetId) return alert("Wprowadź ID Receivera");
            if (!localStream) return alert("Najpierw włącz kamerę");

            connectBtn.disabled = true;
            connectBtn.innerText = "Łączenie...";

            peer = new Peer({
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478' }
                    ]
                }
            });

            peer.on('open', () => {
                activeCall = peer.call(targetId, localStream);
                dataConnection = peer.connect(targetId);
                
                dataConnection.on('open', () => {
                    connectBtn.classList.replace('bg-blue-600', 'bg-green-600');
                    connectBtn.innerText = "Połączono!";
                    sendDataBtn.removeAttribute('disabled');
                });

                dataConnection.on('close', resetSenderUI);
                dataConnection.on('error', (err) => {
                    console.error(err);
                    resetSenderUI();
                });
            });

            peer.on('error', (err) => {
                alert("Błąd połączenia: " + err.type);
                resetSenderUI();
            });
        });

        sendDataBtn.addEventListener('click', () => {
            if (dataConnection && dataConnection.open) {
                const rawData = jsonInput.value;
                try {
                    const parsed = JSON.parse(rawData);
                    dataConnection.send(parsed);
                } catch (e) {
                    alert("Nieprawidłowy format JSON!");
                }
            }
        });

        function resetSenderUI() {
            if (dataConnection) dataConnection.close();
            if (activeCall) activeCall.close();
            if (peer) peer.destroy();

            peer = null;
            dataConnection = null;
            activeCall = null;

            connectBtn.disabled = false;
            connectBtn.classList.remove('bg-green-600');
            connectBtn.classList.add('bg-blue-600');
            connectBtn.innerText = "Połącz i Przesyłaj";
            sendDataBtn.setAttribute('disabled', 'true');
        }

        window.addEventListener('beforeunload', () => {
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
